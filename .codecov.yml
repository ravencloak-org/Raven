coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
        if_not_found: failure
    patch:
      default:
        target: 50%
        threshold: 10%
        if_not_found: success

ignore:
  - "internal/grpc/pb/**"    # generated protobuf code
  - "**/*.pb.go"             # generated files
  - "ai-worker/raven_worker/generated/**"  # generated protobuf code (Python)
  - "**/*_pb2.py"
  - "**/*_pb2_grpc.py"
  - "**/*_pb2.pyi"
  - "cmd/**/main.go"         # main entrypoints only
  - "docs/**"
  - "frontend/**"
  - "migrations/**"
  - "internal/integration/**" # integration test infrastructure
  - ".github/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
