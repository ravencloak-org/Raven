title: Raven
description: Open-source multi-tenant knowledge base platform with AI-powered chat, voice, and WhatsApp
url: https://ravencloak-org.github.io
baseurl: /Raven
repository: ravencloak-org/Raven

remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  # Local / generated / agent state
  - .worktrees/
  - .claude/
  - .entire/
  - .serena/
  - .mcp_data/
  - .idea/
  - .wrangler/
  - ai-worker/.venv/
  - frontend/node_modules/
  - frontend/dist/
  - node-compile-cache/

  # Source code trees (not documentation)
  - cmd/
  - internal/
  - pkg/
  - proto/
  - ai-worker/
  - frontend/
  - landing/
  - migrations/
  - deploy/
  - tests/
  - backup/
  - contracts/
  - update-check/

  # Build / config files — not meant for Pages rendering
  - "*.sh"
  - "Makefile"
  - "Makefile.edge"
  - "Dockerfile"
  - "docker-compose*.yml"
  - "go.mod"
  - "go.sum"
  - "bun.lock"
  - ".env.*"
  - ".air.toml"
  - ".codecov.yml"
  - ".coderabbit.yaml"
  - ".dockerignore"
  - ".gitignore"
  - ".gitleaks.toml"
  - ".goreleaser.yaml"
  - ".golangci.yml"
  - ".mergify.yml"
  - ".trivyignore"
  - ".mcp.json"
  - "cliff.toml"
  - "ee-LICENSE"
  - "ee-README.md"
  - "index.html"

header_pages:
  - docs/project-status.md
  - docs/milestones.md
  - DEVELOPMENT.md
  - CONTRIBUTING.md
