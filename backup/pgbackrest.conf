# pgBackRest configuration for Raven
# Reference: https://pgbackrest.org/configuration.html
#
# This file is mounted into the pgbackrest sidecar at /etc/pgbackrest/pgbackrest.conf
# and into the postgres container for WAL archiving.

[global]
# ─── Repository ───────────────────────────────────────────────────────────────
repo1-type=posix
repo1-path=/var/lib/pgbackrest
repo1-retention-full=4
repo1-retention-diff=30

# ─── Compression ──────────────────────────────────────────────────────────────
compress-type=zst
compress-level=3

# ─── Parallelism ──────────────────────────────────────────────────────────────
process-max=2

# ─── Logging ──────────────────────────────────────────────────────────────────
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# ─── TLS / connection ────────────────────────────────────────────────────────
# pgBackRest connects to PostgreSQL via the pg socket exposed on the shared volume.

[raven]
# ─── PostgreSQL connection ────────────────────────────────────────────────────
pg1-host=postgres
pg1-port=5432
pg1-database=raven
pg1-path=/var/lib/postgresql/data

# ─── Stanza ───────────────────────────────────────────────────────────────────
# The stanza name must match the section header above.
