# Raven — EC2 server deployment
#
# Runs on a secondary Docker daemon (hidden from default docker ps).
# Cloudflare Tunnel handles all inbound traffic — no ports exposed to the internet.
#
# Usage:
#   DOCKER_HOST=unix:///run/raven/docker.sock \
#   docker compose -f deploy/ec2/docker-compose.server.yml --env-file .env.server up -d

services:
  # ─── Frontend (Vue SPA served via nginx) ───────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/ravencloak-org/frontend:latest}
    ports:
      - "127.0.0.1:3080:80"
    networks:
      - raven-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Go API ────────────────────────────────────────────────────────────────
  go-api:
    image: ${GO_API_IMAGE:-ghcr.io/ravencloak-org/go-api:latest}
    # Bind to loopback only — cloudflared reaches it, internet cannot.
    ports:
      - "127.0.0.1:8081:8081"
    env_file: .env.server
    environment:
      ZITADEL_EXTERNALDOMAIN: ${ZITADEL_EXTERNALDOMAIN:-auth.ravencloak.org}
      ZITADEL_CLIENT_ID: ${ZITADEL_CLIENT_ID}
      ZITADEL_EXTERNALSECURE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - raven-net
    restart: unless-stopped

  # ─── Python AI Worker (gRPC) ───────────────────────────────────────────────
  python-worker:
    image: ${PYTHON_WORKER_IMAGE:-ghcr.io/ravencloak-org/python-worker:latest}
    env_file: .env.server
    environment:
      RAVEN_MEMORY_DIR: /var/raven/memories
    volumes:
      - raven-memories:/var/raven/memories
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    networks:
      - raven-net
    restart: unless-stopped
    # No external ports — go-api reaches it via Docker network on :50051

  # ─── PostgreSQL + pgvector ─────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-raven}
      POSTGRES_USER: ${POSTGRES_USER:-raven}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg-data:/var/lib/postgresql
      - ../../deploy/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raven} -d ${POSTGRES_DB:-raven}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - raven-net
    restart: unless-stopped
    # No external port — only reachable inside raven-net

  # ─── Valkey ────────────────────────────────────────────────────────────────
  valkey:
    image: valkey/valkey:8.1-alpine
    command: ["valkey-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru", "--save", "60", "1"]
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - raven-net
    restart: unless-stopped

  # ─── Zitadel IAM ──────────────────────────────────────────────────────────
  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.71.12
    restart: always
    command: >
      start-from-init
      --config /zitadel-config.yaml
      --steps /zitadel-init-steps.yaml
      --masterkey "${ZITADEL_MASTERKEY}"
      --tlsMode disabled
    ports:
      - "127.0.0.1:8180:8080"
    volumes:
      - ../../deploy/zitadel/zitadel-config.yaml:/zitadel-config.yaml:ro
      - ../../deploy/zitadel/zitadel-init-steps.yaml:/zitadel-init-steps.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - raven-net
    environment:
      - ZITADEL_MASTERKEY=${ZITADEL_MASTERKEY}
      - ZITADEL_EXTERNALDOMAIN=${ZITADEL_EXTERNALDOMAIN:-auth.ravencloak.org}
      - ZITADEL_EXTERNALPORT=${ZITADEL_EXTERNALPORT:-443}
      - ZITADEL_EXTERNALSECURE=${ZITADEL_EXTERNALSECURE:-true}
      - ZITADEL_DATABASE_POSTGRES_HOST=postgres
      - ZITADEL_DATABASE_POSTGRES_PORT=5432
      - ZITADEL_DATABASE_POSTGRES_DATABASE=zitadel
      - ZITADEL_DATABASE_POSTGRES_USER_USERNAME=zitadel
      - ZITADEL_DATABASE_POSTGRES_USER_PASSWORD=${ZITADEL_DB_PASSWORD:-zitadel}
      - ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME=${POSTGRES_USER:-raven}
      - ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- --header='Host: auth.ravencloak.org' http://localhost:8080/debug/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ─── SeaweedFS (object storage) ───────────────────────────────────────────
  seaweedfs-master:
    image: chrislusf/seaweedfs
    command: "master -ip=seaweedfs-master -ip.bind=0.0.0.0"
    networks:
      - raven-net
    restart: unless-stopped

  seaweedfs-volume:
    image: chrislusf/seaweedfs
    command: "volume -mserver=seaweedfs-master:9333 -ip.bind=0.0.0.0 -dir=/data"
    volumes:
      - seaweedfs-data:/data
    depends_on:
      - seaweedfs-master
    networks:
      - raven-net
    restart: unless-stopped

  seaweedfs-filer:
    image: chrislusf/seaweedfs
    command: "filer -master=seaweedfs-master:9333 -ip.bind=0.0.0.0 -s3"
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    networks:
      - raven-net
    restart: unless-stopped
    # No external port — go-api reaches it via Docker network

  # ─── OpenObserve (observability) — loopback only ──────────────────────────
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    ports:
      - "127.0.0.1:5080:5080"
    environment:
      ZO_ROOT_USER_EMAIL: ${ZO_ROOT_USER_EMAIL:-admin@raven.local}
      ZO_ROOT_USER_PASSWORD: ${ZO_ROOT_USER_PASSWORD:?ZO_ROOT_USER_PASSWORD is required}
    volumes:
      - openobserve-data:/data
    networks:
      - raven-net
    restart: unless-stopped

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pg-data:
  seaweedfs-data:
  valkey-data:
  openobserve-data:
  raven-memories:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  raven-net:
    driver: bridge
    # Internal bridge — containers talk to each other by service name.
    # No host-level routing needed (cloudflared handles ingress).
