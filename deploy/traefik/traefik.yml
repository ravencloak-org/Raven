# Traefik v3 static configuration — local development
# This file is mounted into the Traefik container at /etc/traefik/traefik.yml.

api:
  dashboard: true
  insecure: true

log:
  level: INFO

accessLog: {}

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: raven-internal
