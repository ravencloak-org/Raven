name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'ai-worker/**'
      - 'proto/**'
  pull_request:
    branches: [main]
    paths:
      - 'ai-worker/**'
      - 'proto/**'

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai-worker/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check

      - name: Ruff format check
        run: ruff format --check

      - name: Run tests
        run: pytest -v
