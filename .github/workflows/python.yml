name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'ai-worker/**'
      - 'proto/**'
  pull_request:
    branches: [main]
    paths:
      - 'ai-worker/**'
      - 'proto/**'
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ai-worker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai-worker/pyproject.toml

      - run: pip install -e ".[dev]"

      - run: ruff check

      - run: ruff format --check

      - run: mypy raven_worker

      - name: Install dotenvx
        run: curl -sfS https://dotenvx.sh | sh

      - name: Run tests
        run: |
          if [ -n "$DOTENV_PRIVATE_KEY_CI" ]; then
            dotenvx run -f ${{ github.workspace }}/.env.ci -- pytest -v --cov=raven_worker --cov-report=xml --cov-report=term-missing
          else
            echo "::warning::DOTENV_PRIVATE_KEY_CI not set (fork PR?) — running tests without dotenvx"
            pytest -v --cov=raven_worker --cov-report=xml --cov-report=term-missing
          fi
        env:
          DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: ai-worker/coverage.xml
          retention-days: 7

  smoke-tests:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: smoke
    permissions:
      contents: read
    defaults:
      run:
        working-directory: ai-worker
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - run: pip install -e ".[dev]"

      - name: Install dotenvx
        run: curl -sfS https://dotenvx.sh | sh

      - name: Run LLM provider smoke tests
        env:
          DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}
        run: |
          if [ -n "$DOTENV_PRIVATE_KEY_CI" ]; then
            dotenvx run -f ${{ github.workspace }}/.env.ci -- bash -euo pipefail -c '
              : "${OPENAI_API_KEY:?OPENAI_API_KEY missing from .env.ci}"
              : "${COHERE_API_KEY:?COHERE_API_KEY missing from .env.ci}"
              : "${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY missing from .env.ci}"
              python -m pytest tests/smoke/ -v --tb=short
            '
          else
            echo "::warning::DOTENV_PRIVATE_KEY_CI not set — skipping smoke tests"
            exit 0
          fi
