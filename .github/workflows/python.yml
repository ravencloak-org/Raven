name: Python CI

on:
  push:
    branches: [main]
    paths:
      - 'ai-worker/**'
      - 'proto/**'
  pull_request:
    branches: [main]
    paths:
      - 'ai-worker/**'
      - 'proto/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai-worker/pyproject.toml

      - run: pip install -e ".[dev]"

      - run: ruff check

      - run: ruff format --check

      - run: mypy raven_worker

      - run: pytest -v --cov=raven_worker --cov-report=xml --cov-report=term-missing

      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ai-worker/coverage.xml
          retention-days: 7

  smoke-tests:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: smoke
    defaults:
      run:
        working-directory: ai-worker
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -e ".[dev]"

      - name: Run LLM provider smoke tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pytest tests/smoke/ -v --tb=short
