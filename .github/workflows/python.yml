name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'ai-worker/**'
              - 'proto/**'
              - '.github/workflows/python.yml'

  test:
    name: Lint, Type-check & Test
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ai-worker/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check

      - name: Ruff format check
        run: ruff format --check

      - name: Type check (mypy)
        run: mypy raven_worker

      - name: Run tests with coverage
        run: pytest -v --cov=raven_worker --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ai-worker/coverage.xml
          retention-days: 7

  test-skip:
    name: Lint, Type-check & Test
    needs: changes
    if: needs.changes.outputs.src != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No Python changes, skipping"
