name: Infra Lint

# Lint the non-app-code surfaces that the Go / Python / frontend CI jobs
# don't cover: Dockerfiles (hadolint) and GitHub Actions workflow YAML
# (actionlint). Kept in its own workflow so Dockerfile edits don't
# trigger the whole security scan battery.

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'ai-worker/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'ai-worker/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'

permissions: {}

jobs:
  hadolint:
    name: Hadolint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - Dockerfile
          - ai-worker/Dockerfile
          - frontend/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Hadolint ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3
        with:
          dockerfile: ${{ matrix.dockerfile }}
          # DL3008 (apt pin versions) + DL3018 (apk pin versions) are
          # noisy on base-image-derived Dockerfiles; enable later once
          # we version-pin systematically.
          ignore: DL3008,DL3018
          failure-threshold: warning

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Actionlint + shellcheck
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1
        with:
          reporter: github-pr-check
          fail_level: warning
