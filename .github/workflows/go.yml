name: Go CI

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'tests/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'tests/**'
      - 'go.mod'
      - 'go.sum'

permissions: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - run: go mod download

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev "linux-tools-$(uname -r)" || sudo apt-get install -y clang llvm libbpf-dev

      - run: CGO_ENABLED=1 go build ./cmd/api

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - run: go mod download

      - name: Install dotenvx
        run: curl -sfS https://dotenvx.sh | sh

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev "linux-tools-$(uname -r)" || sudo apt-get install -y clang llvm libbpf-dev

      - name: Prepare coverage directory
        run: mkdir -p .coverdata/unit

      - name: Run tests
        run: |
          if [ -n "$DOTENV_PRIVATE_KEY_CI" ]; then
            dotenvx run -f .env.ci -- go test -race -timeout 30m \
              -cover -coverpkg="$COV_PKGS" ./... \
              -args -test.gocoverdir="$PWD/.coverdata/unit"
          else
            echo "::warning::DOTENV_PRIVATE_KEY_CI not set (fork PR?) — running tests without dotenvx"
            go test -race -timeout 30m \
              -cover -coverpkg="$COV_PKGS" ./... \
              -args -test.gocoverdir="$PWD/.coverdata/unit"
          fi
        env:
          COV_PKGS: github.com/ravencloak-org/Raven/internal/...,github.com/ravencloak-org/Raven/pkg/...,github.com/ravencloak-org/Raven/cmd/...
          DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-unit
          path: .coverdata/unit/
          retention-days: 5
          if-no-files-found: ignore

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - run: go mod download

      - name: Install dotenvx
        run: curl -sfS https://dotenvx.sh | sh

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev "linux-tools-$(uname -r)" || sudo apt-get install -y clang llvm libbpf-dev

      - name: Pre-pull testcontainers image
        run: docker pull pgvector/pgvector:pg18

      - name: Prepare coverage directories
        run: mkdir -p .coverdata/migrations .coverdata/integration

      - name: Run migration tests
        run: |
          if [ -n "$DOTENV_PRIVATE_KEY_CI" ]; then
            dotenvx run -f .env.ci -- go test -race -run '^TestMigrationsUpAndDown$' \
              -cover -coverpkg="$COV_PKGS" ./migrations/... \
              -args -test.gocoverdir="$PWD/.coverdata/migrations"
          else
            go test -race -run '^TestMigrationsUpAndDown$' \
              -cover -coverpkg="$COV_PKGS" ./migrations/... \
              -args -test.gocoverdir="$PWD/.coverdata/migrations"
          fi
        env:
          COV_PKGS: github.com/ravencloak-org/Raven/internal/...,github.com/ravencloak-org/Raven/pkg/...,github.com/ravencloak-org/Raven/cmd/...
          DOTENV_PRIVATE_KEY_CI: ${{ secrets.DOTENV_PRIVATE_KEY_CI }}
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Run integration tests with coverage
        run: |
          go test -tags=integration -race -timeout 5m \
            -cover -coverpkg="$COV_PKGS" \
            ./internal/integration/ \
            -args -test.gocoverdir="$PWD/.coverdata/integration"
        env:
          COV_PKGS: github.com/ravencloak-org/Raven/internal/...,github.com/ravencloak-org/Raven/pkg/...,github.com/ravencloak-org/Raven/cmd/...
          TESTCONTAINERS_RYUK_DISABLED: "true"

      - name: Upload migrations coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-migrations
          path: .coverdata/migrations/
          retention-days: 5
          if-no-files-found: ignore

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-integration
          path: .coverdata/integration/
          retention-days: 5
          if-no-files-found: ignore

  vet:
    name: Vet & Generate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - run: go mod download

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev "linux-tools-$(uname -r)" || sudo apt-get install -y clang llvm libbpf-dev

      - run: go vet ./...

      - name: Verify generated eBPF files are up-to-date
        run: |
          if [ -f /sys/kernel/btf/vmlinux ] && bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/ebpf/programs/vmlinux.h 2>/dev/null; then
            go generate ./internal/ebpf/...
            git diff --exit-code -- internal/ebpf ':(exclude)internal/ebpf/programs/vmlinux.h' || (echo "Generated eBPF artifacts are out of date. Run 'go generate ./internal/ebpf/...'" && exit 1)
          else
            echo "::warning::BTF or bpftool not available on this runner — skipping eBPF artifact verification"
          fi

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [build, unit, integration, vet]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Fail if any upstream job failed
        if: |
          needs.build.result != 'success' ||
          needs.unit.result != 'success' ||
          needs.integration.result != 'success' ||
          needs.vet.result != 'success'
        run: |
          echo "build: ${{ needs.build.result }}"
          echo "unit: ${{ needs.unit.result }}"
          echo "integration: ${{ needs.integration.result }}"
          echo "vet: ${{ needs.vet.result }}"
          exit 1

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Prepare coverage directories
        run: mkdir -p .coverdata/unit .coverdata/migrations .coverdata/integration coverage

      - name: Download unit coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-unit
          path: .coverdata/unit/
        continue-on-error: true

      - name: Download migrations coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-migrations
          path: .coverdata/migrations/
        continue-on-error: true

      - name: Download integration coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-integration
          path: .coverdata/integration/
        continue-on-error: true

      - name: Merge coverage profiles
        run: |
          INPUTS=""
          for d in unit migrations integration; do
            if compgen -G ".coverdata/$d/cov*" >/dev/null; then
              INPUTS="${INPUTS:+$INPUTS,}.coverdata/$d"
            fi
          done
          if [ -z "$INPUTS" ]; then
            echo "::warning::no coverage data collected"
            exit 0
          fi
          echo "merging: $INPUTS"
          go tool covdata textfmt -i="$INPUTS" -o=coverage/cov.out
          go tool covdata percent -i="$INPUTS" | tee coverage/summary.txt
          go tool cover -func=coverage/cov.out | tail -1 | tee -a coverage/summary.txt
          go tool cover -html=coverage/cov.out -o coverage/coverage.html

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-data
          path: |
            .coverdata/
            coverage/
          retention-days: 5
          if-no-files-found: ignore

      - uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/cov.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev "linux-tools-$(uname -r)" || sudo apt-get install -y clang llvm libbpf-dev

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  ebpf-integration:
    name: eBPF Integration Tests
    # ubuntu-latest runners have kernel ≥ 6.x with BTF and sufficient caps for eBPF
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev

      - name: Run eBPF integration tests
        run: go test -race -v ./internal/ebpf/... ./cmd/api/...

  ebpf-privileged-tests:
    name: eBPF Privileged Test Harness
    runs-on: ubuntu-latest
    continue-on-error: true
    # Only run on pushes to main — these tests require privileged containers
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    container:
      image: ubuntu:24.04
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          apt-get update
          # `gcc` is required because `go test -race` needs cgo, and the
          # minimal ubuntu:24.04 container doesn't ship a C compiler.
          # linux-tools-generic covers the bpftool/perf tooling we need and
          # is always available; the host-kernel-specific package is
          # attempted separately so a missing package (the Azure-hosted
          # runner kernel often has no match in noble) doesn't abort the
          # whole install.
          apt-get install -y --no-install-recommends \
            build-essential clang llvm libbpf-dev \
            linux-tools-generic \
            ca-certificates curl git docker.io
          apt-get install -y --no-install-recommends "linux-tools-$(uname -r)" || \
            echo "::warning::linux-tools for kernel $(uname -r) unavailable; using linux-tools-generic"

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - run: go mod download

      - name: Run privileged eBPF tests
        run: |
          go test -tags ebpf -race -v -timeout 10m \
            ./tests/ebpf/xdp/... \
            ./tests/ebpf/observability/... \
            ./tests/ebpf/audit/...
