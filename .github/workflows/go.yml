name: Go CI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev

      - run: CGO_ENABLED=1 go build ./cmd/api

      - run: go test -race -coverprofile=coverage.txt ./...

      - run: go test -race -run '^TestMigrationsUpAndDown$' ./migrations/...

      - uses: codecov/codecov-action@v6
        with:
          files: coverage.txt
          fail_ci_if_error: false

      - run: go vet ./...

      - name: Verify generated eBPF files are up-to-date
        run: |
          # Generate vmlinux.h from kernel BTF (required by BPF C programs)
          sudo apt-get install -y linux-tools-common linux-tools-$(uname -r) 2>/dev/null || true
          if command -v bpftool >/dev/null 2>&1 && bpftool version >/dev/null 2>&1 && [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/ebpf/programs/vmlinux.h
            go generate ./internal/ebpf/...
            git diff --exit-code -- '*.go' || (echo "Generated eBPF files are out of date. Run 'go generate ./internal/ebpf/...'" && exit 1)
          else
            echo "::warning::bpftool or BTF not available — skipping eBPF generate check"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  ebpf-integration:
    name: eBPF Integration Tests
    # ubuntu-latest runners have kernel ≥ 6.x with BTF and sufficient caps for eBPF
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev

      - name: Run eBPF integration tests
        run: go test -race -v ./internal/ebpf/... ./cmd/api/...
