name: Go CI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'

      - '.github/workflows/go.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'

      - '.github/workflows/go.yml'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - run: go build ./cmd/api

      - run: go test -race -coverprofile=coverage.txt ./...

      - run: go test -race -run '^TestMigrationsUpAndDown$' ./migrations/...

      - uses: codecov/codecov-action@v5
        with:
          files: coverage.txt
          fail_ci_if_error: false

      - run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
