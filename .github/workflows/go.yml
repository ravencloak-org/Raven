name: Go CI

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'tests/**'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'tests/**'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev linux-tools-$(uname -r)

      - run: CGO_ENABLED=1 go build ./cmd/api

      - run: go test -race -coverprofile=coverage.txt ./...

      - run: go test -race -run '^TestMigrationsUpAndDown$' ./migrations/...

      - uses: codecov/codecov-action@v6
        with:
          files: coverage.txt
          fail_ci_if_error: false

      - run: go vet ./...

      - name: Verify generated eBPF files are up-to-date
        run: |
          if [ -f /sys/kernel/btf/vmlinux ]; then
            bpftool btf dump file /sys/kernel/btf/vmlinux format c > internal/ebpf/programs/vmlinux.h
            go generate ./internal/ebpf/...
            git diff --exit-code -- internal/ebpf ':(exclude)internal/ebpf/programs/vmlinux.h' || (echo "Generated eBPF artifacts are out of date. Run 'go generate ./internal/ebpf/...'" && exit 1)
          else
            echo "::warning::BTF not available on this runner — skipping eBPF artifact verification"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev linux-tools-$(uname -r)

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  ebpf-integration:
    name: eBPF Integration Tests
    # ubuntu-latest runners have kernel ≥ 6.x with BTF and sufficient caps for eBPF
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install eBPF build tools
        run: sudo apt-get install -y clang llvm libbpf-dev

      - name: Run eBPF integration tests
        run: go test -race -v ./internal/ebpf/... ./cmd/api/...

  ebpf-privileged-tests:
    name: eBPF Privileged Test Harness
    runs-on: ubuntu-latest
    # Only run on pushes to main — these tests require privileged containers
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    container:
      image: ubuntu:24.04
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            clang llvm libbpf-dev linux-tools-$(uname -r) \
            ca-certificates curl git docker.io

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - run: go mod download

      - name: Run privileged eBPF tests
        run: |
          go test -tags ebpf -race -v -timeout 10m \
            ./tests/ebpf/xdp/... \
            ./tests/ebpf/observability/... \
            ./tests/ebpf/audit/...
