name: Release

# Triggered only by pushing a SemVer tag. docker.yml no longer fires on
# tags so the two workflows do not race.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'

permissions: {}

jobs:
  # -----------------------------------------------------------------------
  # preflight: assert the tag was cut from main and is SemVer.
  # -----------------------------------------------------------------------
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.extract.outputs.version }}
      tag: ${{ steps.extract.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          fetch-depth: 0

      - name: Extract version
        id: extract
        env:
          REF: ${{ github.ref }}
        run: |
          TAG="${REF#refs/tags/}"
          VERSION="${TAG#v}"
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+(-rc[0-9]+)?$'; then
            echo "::error::Tag '$TAG' does not match SemVer vX.Y.Z or vX.Y.Z-rcN"
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag is reachable from main
        env:
          TAG: ${{ steps.extract.outputs.tag }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$TAG" origin/main; then
            echo "::error::Tag $TAG is not reachable from origin/main — releases must be cut from main"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # changelog: git-cliff renders the release body from conventional commits.
  # -----------------------------------------------------------------------
  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: preflight
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4.8.0
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Upload release notes
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.0
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          retention-days: 1

  # -----------------------------------------------------------------------
  # go-binaries: goreleaser builds Go binary archives + SHA256SUMS and
  # cosign-signs the checksum file.
  # -----------------------------------------------------------------------
  go-binaries:
    name: Go binaries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: preflight
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3.8.1

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c  # v6
        with:
          version: '~> v2'
          args: release --clean --skip=publish

      - name: Upload binary artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.0
        with:
          name: go-binaries
          path: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/checksums.txt.sig
            dist/checksums.txt.pem
          retention-days: 7

  # -----------------------------------------------------------------------
  # docker-build: build per-platform Docker images on NATIVE runners.
  #
  # Previously the three images were built by a single job on ubuntu-latest
  # with QEMU emulation for the arm64 leg. CGO + eBPF under QEMU pushed the
  # go-api build to 15–25 min and left a 20 min window open for transient
  # GHCR 504s on the manifest push.
  #
  # This matrix builds each (component, platform) on the runner that
  # matches the target arch (ubuntu-latest → amd64, ubuntu-24.04-arm →
  # arm64). Each job pushes by digest only — no tags yet. The digest
  # is exported as a one-file artifact so the follow-up `docker-merge`
  # job can assemble the multi-arch manifest. Signatures and attestations
  # are applied once to the merged manifest in docker-merge, not per
  # platform, to keep a single cosign subject per release.
  # -----------------------------------------------------------------------
  docker-build:
    name: Docker ${{ matrix.component }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    needs: preflight
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # go-api (CGO + eBPF; the one that actually needs the native speed)
          - component: go-api
            context: .
            dockerfile: Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - component: go-api
            context: .
            dockerfile: Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          # python-worker
          - component: python-worker
            context: ai-worker
            dockerfile: ai-worker/Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - component: python-worker
            context: ai-worker
            dockerfile: ai-worker/Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          # frontend (nginx COPY; fast either way but still native)
          - component: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - component: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (labels only)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          # Per-platform GHA cache scope — amd64 and arm64 runners do not
          # share the same cache, and overlapping scopes cause churn.
          cache-from: type=gha,scope=${{ matrix.component }}-${{ matrix.arch }}
          cache-to:   type=gha,scope=${{ matrix.component }}-${{ matrix.arch }},mode=max
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/${{ matrix.component }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.0
        with:
          name: digests-${{ matrix.component }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # -----------------------------------------------------------------------
  # docker-merge: assemble the per-platform digests into a multi-arch
  # manifest, tag it (SemVer + latest), sign with cosign, and attach
  # SLSA build-provenance + SPDX SBOM attestations.
  # -----------------------------------------------------------------------
  docker-merge:
    name: Docker manifest ${{ matrix.component }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [preflight, docker-build]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        component: [go-api, python-worker, frontend]
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.component }}-*
          merge-multiple: true

      - name: Setup Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags for manifest)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(needs.preflight.outputs.tag, '-rc') }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}
        run: |
          tag_args=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digest_args=$(printf '%s@sha256:%s ' "$IMAGE" *)
          # shellcheck disable=SC2086  # intentional word-splitting on tag_args + digest_args
          docker buildx imagetools create $tag_args $digest_args

      - name: Inspect manifest + capture merged digest
        id: manifest
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          merged_digest=$(docker buildx imagetools inspect "${IMAGE}:${VERSION}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "digest=${merged_digest}" >> "$GITHUB_OUTPUT"
          echo "merged manifest digest: ${merged_digest}"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}@${{ steps.manifest.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.component }}.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e  # v3
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          sbom-path: sbom-${{ matrix.component }}.spdx.json
          push-to-registry: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275  # v3
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.component }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3.8.1

      - name: Sign merged manifest
        env:
          IMAGES: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.manifest.outputs.digest }}
        run: |
          echo "$IMAGES" | while IFS= read -r image; do
            [ -z "$image" ] && continue
            echo "Signing ${image}@${DIGEST}"
            cosign sign --yes "${image}@${DIGEST}"
          done

  # -----------------------------------------------------------------------
  # frontend-bundle: produce a signed tarball of the built frontend
  # (/dist) so self-hosted users can serve it from any static host.
  # -----------------------------------------------------------------------
  frontend-bundle:
    name: Frontend bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: preflight
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.ravencloak.org' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.ravencloak.org/api/v1' }}
          VITE_LIVEKIT_URL: ${{ vars.VITE_LIVEKIT_URL || '' }}

      - name: Package bundle
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cd frontend
          tar -czf "../frontend-${VERSION}.tgz" -C dist .
          cd ..
          sha256sum "frontend-${VERSION}.tgz" > "frontend-${VERSION}.tgz.sha256"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3.8.1

      - name: Sign bundle
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          cosign sign-blob \
            --yes \
            --oidc-issuer=https://token.actions.githubusercontent.com \
            --output-signature "frontend-${VERSION}.tgz.sig" \
            --output-certificate "frontend-${VERSION}.tgz.pem" \
            "frontend-${VERSION}.tgz"

      - name: Upload bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.0
        with:
          name: frontend-bundle
          path: |
            frontend-*.tgz
            frontend-*.tgz.sha256
            frontend-*.tgz.sig
            frontend-*.tgz.pem
          retention-days: 7

  # -----------------------------------------------------------------------
  # publish-release: assemble all artifacts into a single GitHub Release.
  # -----------------------------------------------------------------------
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [preflight, changelog, go-binaries, docker-merge, frontend-bundle]
    permissions:
      contents: write
    steps:
      - name: Download go binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: go-binaries
          path: artifacts/binaries

      - name: Download frontend bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: frontend-bundle
          path: artifacts/frontend

      - name: Download release notes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: release-notes
          path: artifacts/notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: Release ${{ needs.preflight.outputs.tag }}
          body_path: artifacts/notes/RELEASE_NOTES.md
          prerelease: ${{ contains(needs.preflight.outputs.tag, '-rc') }}
          fail_on_unmatched_files: true
          files: |
            artifacts/binaries/*.tar.gz
            artifacts/binaries/checksums.txt
            artifacts/binaries/checksums.txt.sig
            artifacts/binaries/checksums.txt.pem
            artifacts/frontend/frontend-*.tgz
            artifacts/frontend/frontend-*.tgz.sha256
            artifacts/frontend/frontend-*.tgz.sig
            artifacts/frontend/frontend-*.tgz.pem
