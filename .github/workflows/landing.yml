name: Deploy Landing to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing.yml"
  pull_request:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing.yml"

concurrency:
  group: landing-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        run: npm ci

      - name: Lint
        working-directory: landing
        run: npm run lint

      # Build before typecheck: `next build` regenerates `next-env.d.ts`
      # (which is gitignored), and `tsc --noEmit` depends on the type
      # references it declares. Build also runs its own TS check on
      # everything reachable from app/, so this catches type errors first.
      - name: Build
        working-directory: landing
        run: npm run build

      - name: Typecheck
        working-directory: landing
        run: npm run typecheck

      - name: Install Playwright browsers
        working-directory: landing
        run: npx playwright install --with-deps chromium

      - name: Smoke tests
        working-directory: landing
        env:
          CI: "true"
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: landing/playwright-report/
          retention-days: 7

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy landing/out --project-name=raven-landing --branch=main --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
