name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'frontend/**'
              - '.github/workflows/frontend.yml'

  build:
    name: Lint & Build
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        if: needs.changes.outputs.src == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: needs.changes.outputs.src == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.src == 'true'
        run: npm ci

      - name: Lint
        if: needs.changes.outputs.src == 'true'
        run: npm run lint

      - name: Type check
        if: needs.changes.outputs.src == 'true'
        run: npx vue-tsc --noEmit

      - name: Build
        if: needs.changes.outputs.src == 'true'
        run: npm run build

  e2e:
    name: Playwright E2E
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        if: needs.changes.outputs.src == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: needs.changes.outputs.src == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.src == 'true'
        run: npm ci

      - name: Build
        if: needs.changes.outputs.src == 'true'
        run: npm run build

      - name: Install Playwright browsers
        if: needs.changes.outputs.src == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        if: needs.changes.outputs.src == 'true'
        run: npm run test:e2e
