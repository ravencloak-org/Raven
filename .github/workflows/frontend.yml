name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npx vue-tsc --noEmit

      - run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Vitest unit tests (fast-fail gate)
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for preview
        run: npm run build

      - name: Playwright E2E tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASS: ${{ secrets.E2E_PASS }}
          E2E_ADMIN: ${{ secrets.E2E_ADMIN }}
          E2E_ADMIN_PASS: ${{ secrets.E2E_ADMIN_PASS }}
          E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
          E2E_KB_ID: ${{ secrets.E2E_KB_ID }}
          E2E_KB_A_KEY: ${{ secrets.E2E_KB_A_KEY }}
          E2E_KB_B_ID: ${{ secrets.E2E_KB_B_ID }}
          META_WEBHOOK_SECRET: ${{ secrets.META_WEBHOOK_SECRET }}
          API_BASE_URL: http://localhost:8080
          KEYCLOAK_URL: http://localhost:8180

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
