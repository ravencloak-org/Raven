name: Docker Build & Push

on:
  push:
    branches: [main]
    # Tag builds are handled by release.yml (with cosign signing). This
    # workflow is for main-branch CI + PR-gate builds only.
    paths:
      - 'Dockerfile'
      - 'ai-worker/Dockerfile'
      - 'frontend/Dockerfile'
      - 'frontend/nginx.conf'
      - 'docker-compose.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'ai-worker/Dockerfile'
      - 'frontend/Dockerfile'
      - 'frontend/nginx.conf'
      - 'docker-compose.yml'
      # NOTE: `.github/workflows/docker.yml` is intentionally NOT a path
      # filter trigger. Internal edits to this workflow (Dependabot SHA
      # bumps, refactors) shouldn't fire a 25-minute multi-arch build that
      # produces no useful signal. Regressions surface on the next push
      # that actually touches a Dockerfile.

permissions: {}

jobs:
  # PR-gated build: verifies the image still builds on each native runner.
  # Previously a single ubuntu-latest job did multi-arch via QEMU and the
  # arm64 leg with CGO + eBPF took ~20 min. Splitting per arch onto native
  # runners lifts that to ~5 min critical path. PR-gate doesn't need to
  # produce a manifest — verifying both arches build cleanly is enough.
  build:
    name: Build ${{ matrix.image }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: go-api
            context: .
            dockerfile: Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: go-api
            context: .
            dockerfile: Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - image: python-worker
            context: ai-worker
            dockerfile: ai-worker/Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: python-worker
            context: ai-worker
            dockerfile: ai-worker/Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
          - image: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - image: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          platforms: ${{ matrix.platform }}
          # Per-(image,arch) cache scope — different arches don't share
          # buildx layers.
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to:   type=gha,scope=${{ matrix.image }}-${{ matrix.arch }},mode=max
          build-args: |
            ${{ matrix.image == 'frontend' && format('VITE_API_URL={0}', vars.VITE_API_URL || 'https://api.ravencloak.org') || '' }}
            ${{ matrix.image == 'frontend' && format('VITE_API_BASE_URL={0}', vars.VITE_API_BASE_URL || 'https://api.ravencloak.org/api/v1') || '' }}
            ${{ matrix.image == 'frontend' && format('VITE_LIVEKIT_URL={0}', vars.VITE_LIVEKIT_URL || '') || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

  # Main-branch / tag-push publish: rebuilds from the GHA build cache
  # populated by the `build` job and pushes to GHCR. `packages: write` is
  # scoped to this job only.
  publish:
    name: Publish ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write      # Sigstore OIDC for keyless signing
      attestations: write  # GitHub attestation store
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: go-api
            context: .
            dockerfile: Dockerfile
          - image: python-worker
            context: ai-worker
            dockerfile: ai-worker/Dockerfile
          - image: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ${{ matrix.image == 'frontend' && format('VITE_API_URL={0}', vars.VITE_API_URL || 'https://api.ravencloak.org') || '' }}
            ${{ matrix.image == 'frontend' && format('VITE_API_BASE_URL={0}', vars.VITE_API_BASE_URL || 'https://api.ravencloak.org/api/v1') || '' }}
            ${{ matrix.image == 'frontend' && format('VITE_LIVEKIT_URL={0}', vars.VITE_LIVEKIT_URL || '') || '' }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          sbom: false

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-${{ matrix.image }}.spdx.json
          push-to-registry: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
