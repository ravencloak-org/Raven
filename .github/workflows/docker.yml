name: Docker Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'Dockerfile'
              - 'ai-worker/Dockerfile'
              - 'docker-compose.yml'
              - '.github/workflows/docker.yml'

  build-go-api:
    name: Build go-api
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: needs.changes.outputs.src == 'true'
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: needs.changes.outputs.src == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: needs.changes.outputs.src == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: needs.changes.outputs.src == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build go-api
        if: needs.changes.outputs.src == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ github.repository_owner }}/go-api:${{ github.sha }}

  build-python-worker:
    name: Build python-worker
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        if: needs.changes.outputs.src == 'true'
        uses: actions/checkout@v6

      - name: Set up QEMU
        if: needs.changes.outputs.src == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: needs.changes.outputs.src == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: needs.changes.outputs.src == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build python-worker
        if: needs.changes.outputs.src == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ai-worker
          file: ai-worker/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ghcr.io/${{ github.repository_owner }}/python-worker:${{ github.sha }}
