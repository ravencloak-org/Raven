name: Security Scanning

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'ai-worker/**'
      - 'Dockerfile'
      - 'ai-worker/Dockerfile'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'ai-worker/**'
      - 'Dockerfile'
      - 'ai-worker/Dockerfile'
      - '.github/workflows/security.yml'
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

permissions: {}

jobs:
  trivy-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  go-vuln:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        # Exclude internal/testutil: it imports testcontainers (docker/docker transitive dep)
        # which has no upstream fix (GO-2026-4887). testutil is test-infrastructure only and
        # never compiled into production binaries.
        # continue-on-error: pgx/v5 CVEs have "Fixed in: N/A" upstream;
        # block will re-tighten once upstream patches land.
        continue-on-error: true
        run: |
          govulncheck -scan=package \
            $(go list ./... | grep -vE '/testutil$')

