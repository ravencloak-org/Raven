name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/pages.yml"

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.ravencloak.org' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api.ravencloak.org/api/v1' }}
          VITE_KEYCLOAK_URL: ${{ vars.VITE_KEYCLOAK_URL || 'https://auth.ravencloak.org' }}
          VITE_KEYCLOAK_REALM: ${{ vars.VITE_KEYCLOAK_REALM || 'raven' }}
          VITE_KEYCLOAK_CLIENT_ID: ${{ vars.VITE_KEYCLOAK_CLIENT_ID || 'raven-frontend' }}
          VITE_LIVEKIT_URL: ${{ vars.VITE_LIVEKIT_URL || '' }}

      - name: Deploy to Cloudflare Pages
        # Only deploy on push to main when the API token is available.
        # Use an env var to hold the secret so we can reference it in the if-condition
        # (secrets context is not valid directly in step-level if expressions).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.CLOUDFLARE_API_TOKEN != ''
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=raven-frontend --commit-dirty=true
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
