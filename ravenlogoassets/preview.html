<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ravenicons preview</title>
<link rel="stylesheet" href="font/ravenicons.css" />
<style>
  body { margin: 0; padding: 4rem; background: #fafafa; font-family: system-ui, sans-serif; color: #1a1a1a; }
  .logo { font-family: 'ravenicons'; font-size: 12rem; letter-spacing: 0.05em; line-height: 1; }
  .label { color: #888; font-size: 0.9rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .row { font-size: 3rem; margin-top: 2rem; }
  .row span { display: inline-block; width: 5rem; text-align: center; }
</style>
</head>
<body>
  <div class="label">font-family: ravenicons — typed as "RAVEN"</div>
  <div class="logo">RAVEN</div>

  <div class="label" style="margin-top:3rem">via class names</div>
  <div class="row">
    <i class="ravenicons-R"></i>
    <i class="ravenicons-A"></i>
    <i class="ravenicons-V"></i>
    <i class="ravenicons-E"></i>
    <i class="ravenicons-N"></i>
  </div>
</body>
</html>
